services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 5s
      timeout: 5s
      retries: 20

  local-oidc:
    image: quay.io/keycloak/keycloak:26.0
    command: ["start-dev", "--import-realm", "--http-port=8080"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      KC_DB: postgres
      KC_DB_URL_HOST: postgres
      KC_DB_URL_DATABASE: keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
    ports:
      - "5556:8080"
    volumes:
      - ./local/oidc/keycloak/onerelease-realm.json:/opt/keycloak/data/import/onerelease-realm.json:ro

  onerelease-server:
    build:
      context: ./api
    environment:
      ONERELEASE_BACKEND: memory
      WATCHFILES_FORCE_POLLING: "true"
      ONERELEASE_AUTH_MODE: oidc
      ONERELEASE_OIDC_ISSUER: http://local-oidc:8080/realms/onerelease
      ONERELEASE_OIDC_PUBLIC_ISSUER: http://localhost:5556/realms/onerelease
      ONERELEASE_OIDC_JWKS_URL: http://local-oidc:8080/realms/onerelease/protocol/openid-connect/certs
      ONERELEASE_OIDC_AUDIENCE: onerelease-api
      ONERELEASE_OIDC_CLIENT_ID: onerelease-ui
      ONERELEASE_OIDC_GROUPS_CLAIM: groups
      ONERELEASE_OIDC_EMAIL_CLAIM: email
      ONERELEASE_OIDC_NAME_CLAIM: name
      ONERELEASE_OIDC_SUBJECT_CLAIM: email
      ONERELEASE_BOOTSTRAP_ALLOWED_EMAIL: admin@example.local
    depends_on:
      - local-oidc
    ports:
      - "8000:8000"
    volumes:
      - ./api:/app
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://127.0.0.1:8000/openapi.json\", timeout=3)'"]
      interval: 5s
      timeout: 5s
      retries: 20

  onerelease-ui:
    build:
      context: ./webui
    environment:
      CHOKIDAR_USEPOLLING: "true"
      VITE_API_TARGET: http://onerelease-server:8000
      VITE_OIDC_ISSUER: http://localhost:5556/realms/onerelease
      VITE_OIDC_CLIENT_ID: onerelease-ui
      VITE_OIDC_AUDIENCE: onerelease-api
    depends_on:
      - onerelease-server
      - local-oidc
    ports:
      - "5173:5173"
    volumes:
      - ./webui:/app
      - onerelease-ui-node-modules:/app/node_modules

  package-runner:
    build:
      context: .
      dockerfile: runner-example/Dockerfile
    environment:
      ONERELEASE_API_BASE_URL: http://onerelease-server:8000
      ONERELEASE_WORKSPACE_ID: default
      ONERELEASE_RUNNER_ID: package-runner-01
      ONERELEASE_RUNNER_TOKEN: onerelease_pat_package_runner_01
      ONERELEASE_RUNNER_DISPLAY_NAME: Package Runner
      ONERELEASE_RUNNER_POLL_SECONDS: "3"
      ONERELEASE_RUNNER_WORK_SECONDS: "15"
    depends_on:
      onerelease-server:
        condition: service_healthy
    volumes:
      - ./runner-example:/app/runner-example
      - ./sdk/python:/app/sdk/python

  docker-compose-runner:
    build:
      context: .
      dockerfile: runner-example/Dockerfile
    environment:
      ONERELEASE_API_BASE_URL: http://onerelease-server:8000
      ONERELEASE_WORKSPACE_ID: default
      ONERELEASE_RUNNER_ID: docker-compose-runner-01
      ONERELEASE_RUNNER_TOKEN: onerelease_pat_docker_compose_runner_01
      ONERELEASE_RUNNER_DISPLAY_NAME: Docker Compose Runner
      ONERELEASE_RUNNER_POLL_SECONDS: "3"
      ONERELEASE_RUNNER_WORK_SECONDS: "25"
    depends_on:
      onerelease-server:
        condition: service_healthy
    volumes:
      - ./runner-example:/app/runner-example
      - ./sdk/python:/app/sdk/python

volumes:
  postgres-data:
  onerelease-ui-node-modules:
