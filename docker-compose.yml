services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 5s
      timeout: 5s
      retries: 20

  local-oidc:
    image: quay.io/keycloak/keycloak:26.0
    command: ["start-dev", "--import-realm", "--http-port=8080"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      KC_DB: postgres
      KC_DB_URL_HOST: postgres
      KC_DB_URL_DATABASE: keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
    ports:
      - "5556:8080"
    volumes:
      - ./local/oidc/keycloak/settle-realm.json:/opt/keycloak/data/import/settle-realm.json:ro

  settle-server:
    build:
      context: ./api
    environment:
      DEPLOYSET_BACKEND: memory
      WATCHFILES_FORCE_POLLING: "true"
      SETTLE_AUTH_MODE: oidc
      SETTLE_OIDC_ISSUER: http://local-oidc:8080/realms/settle
      SETTLE_OIDC_PUBLIC_ISSUER: http://localhost:5556/realms/settle
      SETTLE_OIDC_JWKS_URL: http://local-oidc:8080/realms/settle/protocol/openid-connect/certs
      SETTLE_OIDC_AUDIENCE: settle-api
      SETTLE_OIDC_CLIENT_ID: settle-ui
      SETTLE_OIDC_GROUPS_CLAIM: groups
      SETTLE_OIDC_EMAIL_CLAIM: email
      SETTLE_OIDC_NAME_CLAIM: name
      SETTLE_OIDC_SUBJECT_CLAIM: email
      SETTLE_BOOTSTRAP_ALLOWED_EMAIL: admin@example.local
    depends_on:
      - local-oidc
    ports:
      - "8000:8000"
    volumes:
      - ./api:/app

  settle-ui:
    build:
      context: ./frontend
    environment:
      CHOKIDAR_USEPOLLING: "true"
      VITE_API_TARGET: http://settle-server:8000
      VITE_OIDC_ISSUER: http://localhost:5556/realms/settle
      VITE_OIDC_CLIENT_ID: settle-ui
      VITE_OIDC_AUDIENCE: settle-api
    depends_on:
      - settle-server
      - local-oidc
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - settle-ui-node-modules:/app/node_modules

volumes:
  postgres-data:
  settle-ui-node-modules:
